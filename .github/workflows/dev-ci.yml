name: Development CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          cd backend
          pylint app/ --disable=C0111,R0903

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Check code formatting
        run: |
          cd backend
          black --check app/ tests/

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linting
        run: |
          cd frontend
          npm run lint || echo "Lint not configured yet"

      - name: Run tests
        run: |
          cd frontend
          npm test || echo "Tests not configured yet"
